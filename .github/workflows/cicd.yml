name: API CI/CD

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: write

jobs:
  APIs-cicd:
    uses: mairie360/CICD/.github/workflows/APIs_cicd.yml@v1.2.1
    permissions:
          contents: write
          packages: write
          id-token: write
    with:
      postman_collection: ${{ vars.POSTMAN_EMAIL_API_COLLECTION_ID }}
      postman_environment: ${{ vars.POSTMAN_EMAIL_API_ENV_ID }}
      package_name: email-api
    secrets: inherit
